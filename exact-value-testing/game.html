<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exact Value Trig Practice</title>
    <link rel="stylesheet" href="game.css">
</head>
<body>

<div id="overlay">
    <div class="menu-card">
        <h1>Exact Value Trainer</h1>
        
        <div id="authContainer" class="auth-box">
            <b>Sign In to Save Scores</b>
            <input type="text" id="authUsername" placeholder="Cool Username (Sign Up Only)" maxlength="15">
            <input type="email" id="authEmail" placeholder="Email">
            <input type="password" id="authPassword" placeholder="Password">
            <div class="auth-btn-row">
                <button id="loginBtn">Login</button>
                <button id="registerBtn">Sign Up</button>
            </div>
            <div class="divider">— OR —</div>
            <button id="guestBtn" class="guest-btn">Play as Guest</button>
        </div>

        <div id="userStatus" class="status-bar"></div>

        <div id="mainMenuContent" style="display: none; width: 100%;">
            <button id="practiceBtn" class="menu-btn">Practice (No Timer)</button>
            <button id="speedrunBtn" class="menu-btn">Speedrun (5 Minutes)</button>
            
            <div id="highScoreDisplay" class="high-score"></div>
            <div id="globalLeaderboard" class="leaderboard">Loading global leaderboard...</div>
            
            <button id="logoutBtn" class="secondary-btn" style="margin-top:10px;">Sign Out</button>
        </div>
    </div>
</div>

<div class="container">
    <h1>Exact Value Trainer</h1>
    
    <div id="timer" class="timer-display">Time Left: 5:00</div>

    <div class="score-board">
        <span class="score correct-score">Correct: <span id="correctCount">0</span></span>
        <span class="score incorrect-score">Incorrect: <span id="incorrectCount">0</span></span>
    </div>

    <div class="question" id="questionArea">Choose a mode</div>
    <div class="options" id="optionsArea"></div>
    <div id="feedback"></div>

    <button id="quitBtn" class="secondary-btn">Quit to Menu</button>
</div>

<script type="module" src="game.js"></script>
</body>
</html>
